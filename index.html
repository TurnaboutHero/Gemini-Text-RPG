<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제미나이 연대기: 무한의 서사</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-adventure {
        font-family: 'IM Fell English', serif;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }
      @keyframes move-background {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .animated-nebula {
          background: linear-gradient(
              -45deg, 
              #0b0217,
              #2a0a4a,
              #0b234f,
              #0b0217
          );
          background-size: 400% 400%;
          animation: move-background 30s ease infinite;
      }
      @keyframes float-up {
        from {
            transform: translateY(0) translateX(-50%);
            opacity: 1;
        }
        to {
            transform: translateY(-50px) translateX(-50%);
            opacity: 0;
        }
    }
    .float-up-effect {
        position: fixed;
        z-index: 100;
        pointer-events: none;
        animation: float-up 1.5s ease-out forwards;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    }
    @keyframes pulse-glow {
        0%, 100% {
            box-shadow: 0 0 5px rgba(56, 189, 248, 0.3), 0 0 10px rgba(56, 189, 248, 0.2);
            transform: scale(1);
        }
        50% {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6), 0 0 25px rgba(56, 189, 248, 0.4);
            transform: scale(1.05);
        }
    }
    .animate-pulse-glow {
        animation: pulse-glow 2.5s infinite ease-in-out;
    }
    </style>

  }
}
</script>
</head>

  </body>
</html>
